upstream fastapi {
    server fastapi:8000;
}

# HTTP -> HTTPS 리다이렉트
server {
    listen 80;
    server_name ai0208.xyz;

    location /.well-known/acme-challenge/ {
        alias /var/www/certbot/.well-known/acme-challenge/;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name ai0208.xyz;

    ssl_certificate /etc/letsencrypt/live/ai0208.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ai0208.xyz/privkey.pem;

    # API 요청
    location /api/ {
        rewrite ^/api/(.*)$ /api/v1/$1 break;
        proxy_pass http://fastapi;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }
    # FastAPI Docs
    location /docs {
        proxy_pass http://fastapi/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /openapi.json {
        proxy_pass http://fastapi/openapi.json;
        proxy_set_header Host $host;
    }

    # 프론트엔드
    location / {
        root /var/www/frontend;
        try_files $uri /index.html;
    }
}